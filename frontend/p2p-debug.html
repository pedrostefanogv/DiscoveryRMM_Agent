<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery - P2P Debug</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
    :root {
      --bg: #f5f3ec;
      --surface: #fffaf0;
      --surface-2: #f1ead6;
      --text: #1f1a14;
      --muted: #665a4c;
      --accent: #0b6e4f;
      --accent-2: #f4a259;
      --border: #d9cfba;
      --danger: #9a031e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #fffdf7 0%, #f3ebd9 55%, #ece2cd 100%);
      min-height: 100vh;
      padding: 18px;
    }
    .shell { display: grid; gap: 14px; }
    .head {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .head h1 { margin: 0; font-size: 1.2rem; }
    .meta { color: var(--muted); font-size: 0.88rem; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .panel h2 { margin: 0 0 12px 0; font-size: 1rem; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .kv {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.6);
      border-radius: 10px;
      padding: 10px;
    }
    .k { display: block; font-size: 0.78rem; color: var(--muted); }
    .v { display: block; margin-top: 2px; font-weight: 600; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 8px 6px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .form-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      font-family: inherit;
    }
    .status-line { min-height: 20px; font-size: 0.86rem; }
    .status-line.error { color: var(--danger); }
    .status-line.ok { color: var(--accent); }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div>
        <h1>P2P Debug Window</h1>
        <div class="meta">Descoberta de peers, distribuicao hibrida e cache temporario</div>
      </div>
      <div class="actions">
        <button id="refreshBtn" class="btn">Atualizar</button>
        <button id="cleanupBtn" class="btn">Limpar Cache Expirado</button>
      </div>
    </div>

    <div class="panel">
      <h2>Status</h2>
      <div id="statusGrid" class="status-grid"></div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Artifacts Locais</h2>
        <div class="form-grid" style="margin-bottom: 12px;">
          <div>
            <label for="artifactName">Nome do artifact</label>
            <input id="artifactName" type="text" placeholder="pacote-demo.bin" />
          </div>
          <div style="grid-column: 1 / -1;">
            <label for="artifactContent">Conteudo de teste</label>
            <input id="artifactContent" type="text" placeholder="conteudo de teste para distribuir via P2P" />
          </div>
        </div>
        <div class="actions" style="margin-bottom: 12px;">
          <button id="publishArtifactBtn" class="btn primary">Publicar Artifact Teste</button>
          <button id="publishRealArtifactBtn" class="btn">Selecionar Arquivo Real</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Artifact</th>
              <th>Tamanho</th>
              <th>Checksum</th>
            </tr>
          </thead>
          <tbody id="artifactsBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <h2>Replicacao</h2>
        <div class="form-grid">
          <div>
            <label for="artifactSelect">Artifact</label>
            <select id="artifactSelect"></select>
          </div>
          <div>
            <label for="peerSelect">Peer</label>
            <select id="peerSelect"></select>
          </div>
        </div>
        <div class="actions" style="margin-top: 12px;">
          <button id="replicateBtn" class="btn primary">Replicar para Peer</button>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Peers Descobertos</h2>
        <table>
          <thead>
            <tr>
              <th>Agent</th>
              <th>Endereco</th>
              <th>Origem</th>
              <th>Visto em</th>
            </tr>
          </thead>
          <tbody id="peersBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <h2>Configuracao P2P</h2>
        <div class="form-grid">
          <div>
            <label for="enabled">Ativo</label>
            <select id="enabled"><option value="true">true</option><option value="false">false</option></select>
          </div>
          <div>
            <label for="mode">Discovery</label>
            <select id="mode"><option value="mdns">mdns</option><option value="udp">udp</option></select>
          </div>
          <div>
            <label for="ttl">TTL (horas)</label>
            <input id="ttl" type="number" min="24" max="720" />
          </div>
          <div>
            <label for="seedPercent">Seed %</label>
            <input id="seedPercent" type="number" min="1" max="100" />
          </div>
          <div>
            <label for="minSeeds">Min seeds</label>
            <input id="minSeeds" type="number" min="1" max="200" />
          </div>
          <div>
            <label for="tokenMinutes">Token (min)</label>
            <input id="tokenMinutes" type="number" min="1" max="120" />
          </div>
          <div style="grid-column: 1 / -1;">
            <label for="sharedSecret">Shared Secret (opcional)</label>
            <input id="sharedSecret" type="password" placeholder="habilita autenticacao do endpoint /p2p/replicate" />
          </div>
        </div>
        <div class="actions" style="margin-top: 12px;">
          <button id="saveConfigBtn" class="btn primary">Salvar</button>
        </div>
        <div id="statusLine" class="status-line"></div>
      </div>
    </div>
  </div>

  <script src="js/p2p-debug.js"></script>
</body>
</html>
