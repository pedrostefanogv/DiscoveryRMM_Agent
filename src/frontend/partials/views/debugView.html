<main id="debugView" class="page-content hidden" role="tabpanel" aria-labelledby="tabDebug">
    <section class="debug-panel">
      <div class="statusbar page-bar">
        <span class="meta" data-i18n="debug.subtitle">Debug &mdash; configuracao de conexao com servidor remoto</span>
      </div>

      <div class="debug-agent-status-wrap">
        <h2 data-i18n="debug.agentStatusTitle">Status do Agente</h2>
        <div id="agentStatusCard" class="agent-status-card">
          <div class="agent-status-indicator" id="agentStatusDot"></div>
          <div class="agent-status-info">
            <span id="agentStatusLabel" class="agent-status-label" data-i18n="common.verifying">Verificando...</span>
            <span id="agentStatusDetail" class="agent-status-detail"></span>
          </div>
          <button id="agentStatusRefreshBtn" class="btn subtle" title="Atualizar status" data-i18n="action.refresh" data-i18n-title="action.refreshStatus">Atualizar</button>
        </div>
      </div>

      <div class="debug-watchdog-wrap">
        <h2 data-i18n="debug.watchdogTitle">Monitor de Saude (Watchdog)</h2>
        <div class="watchdog-info">
          <p class="meta" data-i18n="debug.watchdogDescription">Monitoramento automatico de componentes criticos. Alertas e recuperacao automatica em caso de travamentos.</p>
        </div>
        <div id="watchdogHealthContainer" class="watchdog-health-container">
          <div class="watchdog-loading" data-i18n="common.loadingStatus">Carregando status...</div>
        </div>
        <div class="watchdog-actions">
          <button id="watchdogRefreshBtn" class="btn subtle" data-i18n="action.refreshStatus">Atualizar Status</button>
        </div>
      </div>

      <div class="debug-config-wrap">
        <h2 data-i18n="debug.connectionSettings">Configuracoes de Conexao</h2>
        <div class="debug-config-form">
          <div class="form-field">
            <label for="apiServer" data-i18n="debug.apiServer">Servidor API (HTTP/HTTPS)</label>
            <div class="debug-server-row">
              <select id="apiScheme" class="debug-scheme-select">
                <option value="https">https://</option>
                <option value="http">http://</option>
              </select>
              <input id="apiServer" type="text" placeholder="api.exemplo.com:5288" autocomplete="off" spellcheck="false" />
            </div>
          </div>
          <div class="form-field">
            <label for="debugAuthToken" data-i18n="debug.authToken">Token de Autenticacao (API)</label>
            <input id="debugAuthToken" type="password" placeholder="Bearer token..." autocomplete="off" />
          </div>
          <div class="form-field">
            <label for="natsServer" data-i18n="debug.natsServer">Servidor NATS (Comandos)</label>
            <input id="natsServer" type="text" placeholder="nats.exemplo.com:4222" autocomplete="off" spellcheck="false" />
          </div>
          <div class="form-field">
            <label for="debugAgentID" data-i18n="debug.agentId">Agent ID (NATS)</label>
            <input id="debugAgentID" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false" />
          </div>
          <div class="form-field">
            <label for="automationP2PWingetInstallEnabled" data-i18n="debug.p2pFirstInstall">Automacao: instalar via P2P-first (teste)</label>
            <select id="automationP2PWingetInstallEnabled">
              <option value="false" data-i18n="debug.p2pFalseOption">false (usar Winget CLI)</option>
              <option value="true" data-i18n="debug.p2pTrueOption">true (tentar P2P e fallback Winget)</option>
            </select>
          </div>
          <div class="debug-actions">
            <button id="debugTestBtn" class="btn subtle" data-i18n="action.testConnection">Testar Conexao</button>
            <button id="debugSaveBtn" class="btn primary" data-i18n="action.saveConfiguration">Salvar Configuracao</button>
            <button id="openP2PDebugWindowBtn" class="btn subtle" data-i18n="action.goToP2P">Ir para P2P</button>
            <button id="openPSADTDebugWindowBtn" class="btn subtle" data-i18n="action.goToPSADT">Ir para PSADT</button>
          </div>
          <div id="debugStatus" class="debug-status" aria-live="polite"></div>
          <div id="debugResponseWrap" class="debug-response-wrap hidden">
            <label id="debugResponseLabel" class="debug-response-label" data-i18n="debug.testResponse">Resposta do teste de conexao</label>
            <pre id="debugResponse" class="debug-response"></pre>
          </div>
        </div>
      </div>
    </section>
  </main>
