<main id="supportView" class="page-content hidden" role="tabpanel" aria-labelledby="tabSupport">
    <section class="support-panel">
      <div class="statusbar page-bar">
        <div>
          <strong>Suporte</strong>
          <div class="meta">Chamados vinculados a este agente</div>
        </div>
        <div class="actions">
          <button id="refreshTicketsBtn" class="btn subtle">Atualizar Lista</button>
          <button id="newTicketBtn" class="btn primary">+ Novo Chamado</button>
        </div>
      </div>

      <div id="agentContextBanner" class="agent-ctx-banner hidden">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span id="agentContextText" class="meta"></span>
      </div>
      <div id="agentContextError" class="agent-ctx-error hidden">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="agentContextErrorText" class="meta"></span>
      </div>

      <div class="support-layout">
        <div class="support-tickets-section">
          <div class="support-sec-header section-bar">
            <span class="meta">Meus Chamados</span>
            <span id="ticketsLoading" class="tickets-loading hidden">Carregando...</span>
          </div>
          <div id="supportTicketsList" class="support-tickets-list">
            <div class="meta">Nenhum chamado.</div>
          </div>
        </div>

        <div id="supportSidePanel" class="support-side-panel hidden">
          <div id="supportTicketDetail" class="support-form-card hidden">
            <button id="backToFormBtn" class="btn subtle back-btn">← Voltar ao formulario</button>
            <div class="ticket-detail-top">
              <span id="ticketDetailId" class="ticket-id-badge"></span>
              <span id="ticketDetailStatus" class="ticket-status-badge"></span>
              <span id="ticketDetailPriority" class="ticket-priority-badge"></span>
            </div>
            <h3 id="ticketDetailTitle" class="ticket-detail-title"></h3>
            <div id="ticketDetailMeta" class="ticket-detail-meta"></div>
            <div id="ticketDetailDesc" class="ticket-detail-desc"></div>

            <div id="ticketClosePanel" class="ticket-close-panel">
              <h4>Fechar Chamado</h4>
              <div class="form-row">
                <div class="form-field">
                  <label for="closeTicketRating">Avaliacao (0-5)</label>
                  <select id="closeTicketRating">
                    <option value="">Sem avaliacao</option>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                  </select>
                </div>
                <div class="form-field">
                  <label for="closeTicketWorkflowStateSelect">Estado final (opcional)</label>
                  <select id="closeTicketWorkflowStateSelect">
                    <option value="">Fechar com estado padrao</option>
                  </select>
                  <input id="closeTicketWorkflowStateId" class="hidden" type="text" placeholder="GUID do estado final customizado" />
                </div>
              </div>
              <div class="form-field">
                <label for="closeTicketComment">Comentario de fechamento (opcional)</label>
                <textarea id="closeTicketComment" rows="3" placeholder="Descreva a solucao aplicada..."></textarea>
              </div>
              <button id="closeTicketBtn" class="btn danger">Fechar Chamado</button>
            </div>

            <div class="comments-section">
              <h4>Comentarios</h4>
              <div id="commentsList" class="comments-list"><div class="meta">Carregando...</div></div>
              <div class="comment-compose">
                <textarea id="commentInput" rows="3" placeholder="Escreva um comentario..."></textarea>
                <button id="submitCommentBtn" class="btn primary">Enviar Comentario</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="supportCreateOverlay" class="support-create-overlay hidden" aria-hidden="true"></div>

      <div id="supportCreateForm" class="support-form-card support-create-modal hidden" role="dialog" aria-modal="true" aria-labelledby="supportCreateTitle">
        <div class="support-create-head section-bar">
          <h3 id="supportCreateTitle">Abrir Chamado</h3>
          <button id="closeNewTicketBtn" class="btn subtle" type="button">Fechar</button>
        </div>
        <form id="supportForm" class="support-form" autocomplete="off">
          <div class="form-field">
            <label for="ticketTitle">Titulo *</label>
            <input id="ticketTitle" type="text" placeholder="Resumo do problema" required maxlength="200" />
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="ticketCategory">Categoria</label>
              <select id="ticketCategory">
                <option value="">Selecione...</option>
                <option value="Hardware">Hardware</option>
                <option value="Software">Software</option>
                <option value="Rede">Rede</option>
                <option value="Acesso">Acesso / Permissoes</option>
                <option value="Email">E-mail</option>
                <option value="Impressora">Impressora</option>
                <option value="VPN">VPN</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
            <div class="form-field">
              <label for="ticketPriority">Prioridade</label>
              <select id="ticketPriority">
                <option value="1">Baixa</option>
                <option value="2" selected>Media</option>
                <option value="3">Alta</option>
                <option value="4">Critica</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label for="ticketDescription">Descricao *</label>
            <textarea id="ticketDescription" rows="6" placeholder="Descreva o problema com detalhes..." required></textarea>
          </div>
          <div id="ticketFormStatus" class="form-status hidden"></div>
          <button type="submit" id="submitTicketBtn" class="btn primary full">Enviar Chamado</button>
        </form>
      </div>
    </section>
  </main>
