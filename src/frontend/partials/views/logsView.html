<main id="logsView" class="page-content hidden" role="tabpanel" aria-labelledby="tabLogs">
    <section class="logs-panel">
      <div class="statusbar page-bar">
        <span class="meta" data-i18n="logs.subtitle">Terminal de logs - saida dos comandos winget</span>
        <div class="actions">
          <label class="logs-filter" for="logsOriginFilter">
            <span data-i18n="field.origin">Origem</span>
            <select id="logsOriginFilter" class="input logs-filter-select" aria-label="Filtrar logs por origem" data-i18n-aria-label="logs.filterByOrigin">
              <option value="all" data-i18n="logs.origin.all">Todas</option>
              <option value="agent">Agent</option>
              <option value="sync">Sync</option>
              <option value="automation">Automacao</option>
              <option value="support">Support</option>
              <option value="chat">Chat</option>
              <option value="watchdog">Watchdog</option>
              <option value="inventory">Inventory</option>
              <option value="updates">Updates</option>
              <option value="printer">Printer</option>
              <option value="debug">Debug</option>
              <option value="startup">Startup</option>
              <option value="other" data-i18n="logs.origin.other">Outros</option>
            </select>
          </label>
          <button id="refreshLogsBtn" class="btn subtle" data-i18n="action.refresh">Atualizar</button>
          <button id="clearLogsBtn" class="btn danger" data-i18n="action.clear">Limpar</button>
        </div>
      </div>
      <pre id="logsOutput" class="terminal logs-terminal"></pre>
    </section>
  </main>
