<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Discovery · P2P Debug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f0; --surface: #fffefa; --surface-2: #f3efe2;
      --text: #1a1712; --muted: #6b6254; --accent: #0a7a56;
      --accent-2: #f0a04b; --border: #ddd6c4; --danger: #c1121f; --success: #2d7a44;
      --radius: 10px; --radius-lg: 14px; --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
      --transition: 0.16s ease;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1a1c; --surface: #242426; --surface-2: #2d2d30; --text: #e8e4db; --muted: #9d9584; --accent: #2ea87a; --border: #3d3a33; --danger: #e63946; --shadow-sm: 0 1px 2px rgba(0,0,0,.3); }
    }
    *,*::before,*::after{box-sizing:border-box}
    html{-webkit-font-smoothing:antialiased}
    body{margin:0;padding:20px;font-family:'Inter',-apple-system,sans-serif;font-size:.88rem;line-height:1.55;color:var(--text);background:var(--bg);min-height:100vh;transition:color var(--transition),background var(--transition)}
    .shell{display:grid;gap:16px;max-width:1200px;margin:0 auto}
    .head{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:var(--shadow-sm)}
    .head h1{margin:0;font-size:1.15rem;font-weight:600}
    .meta{color:var(--muted);font-size:.82rem;margin-top:3px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;transition:all var(--transition)}
    .btn:hover{background:var(--surface-2);box-shadow:var(--shadow-sm)}.btn:active{transform:scale(.98)}
    .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn-primary:hover{opacity:.92}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow-sm)}
    .panel h2{margin:0 0 12px;font-size:1rem;font-weight:600}
    .status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
    .kv{border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);padding:10px 12px}
    .kv .k{display:block;font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
    .kv .v{display:block;font-weight:600;font-size:.9rem}
    .mono{font-family:'JetBrains Mono','Consolas',monospace;font-size:.82rem}
    table{width:100%;border-collapse:collapse;font-size:.84rem}
    th,td{text-align:left;border-bottom:1px solid var(--border);padding:8px 10px;vertical-align:top}
    th{color:var(--muted);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.03em;background:var(--surface-2);position:sticky;top:0}
    .form-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
    label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:4px;font-weight:500}
    input,select{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);font-family:inherit;font-size:.84rem;color:var(--text);transition:border-color var(--transition)}
    input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,122,86,.1)}
    .status-line{min-height:20px;font-size:.82rem;margin-top:8px}.status-line.error{color:var(--danger)}.status-line.ok{color:var(--accent)}
    .audit-list{display:grid;gap:6px;max-height:340px;overflow:auto}
    .audit-item{border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);padding:10px 12px}
    .audit-head{display:flex;justify-content:space-between;gap:10px;font-size:.78rem;color:var(--muted);margin-bottom:5px}
    .audit-item.ok{border-left:4px solid var(--success)}.audit-item.error{border-left:4px solid var(--danger)}
    @media(max-width:980px){.grid{grid-template-columns:1fr}body{padding:12px}.head{flex-direction:column;align-items:flex-start}}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div>
        <h1>P2P Debug Window</h1>
        <div class="meta">Descoberta de peers, distribuição híbrida e cache temporário</div>
      </div>
      <div class="actions">
        <button id="refreshBtn" class="btn">↻ Atualizar</button>
        <button id="bootstrapSyncBtn" class="btn btn-primary">Sincronizar Bootstrap</button>
        <button id="cleanupBtn" class="btn">🗑 Limpar Cache Expirado</button>
      </div>
    </div>

    <div class="panel">
      <h2>Status</h2>
      <div id="statusGrid" class="status-grid"></div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Artifacts Locais</h2>
        <div class="form-grid" style="margin-bottom:12px">
          <div><label for="artifactName">Nome do artifact</label><input id="artifactName" type="text" placeholder="Ex: firefox-installer.exe"></div>
          <div style="grid-column:1/-1"><label for="artifactContent">Conteúdo de teste</label><input id="artifactContent" type="text" placeholder="Conteúdo para distribuir via P2P"></div>
        </div>
        <div class="actions" style="margin-bottom:12px">
          <button id="publishArtifactBtn" class="btn btn-primary">Publicar Artifact Teste</button>
          <button id="publishRealArtifactBtn" class="btn">Selecionar Arquivo Real</button>
          <button id="clearAllArtifactsBtn" class="btn">Apagar Todos os Artifacts</button>
        </div>
        <table><thead><tr><th>Artifact</th><th>Tamanho</th><th>Checksum</th></tr></thead><tbody id="artifactsBody"></tbody></table>
      </div>

      <div class="panel">
        <h2>Replicação</h2>
        <div class="form-grid"><div><label for="artifactSelect">Artifact</label><select id="artifactSelect"></select></div><div><label for="peerSelect">Peer</label><select id="peerSelect"></select></div></div>
        <div class="actions" style="margin-top:12px"><button id="replicateBtn" class="btn btn-primary">Replicar para Peer</button></div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Peers Descobertos</h2>
        <table><thead><tr><th>Agent</th><th>Endereço</th><th>Origem</th><th>Visto em</th></tr></thead><tbody id="peersBody"></tbody></table>
      </div>

      <div class="panel">
        <h2>Configuração P2P</h2>
        <div class="form-grid">
          <div><label for="enabled">Ativo</label><select id="enabled"><option value="true">Sim</option><option value="false">Não</option></select></div>
          <div><label for="mode">Discovery</label><select id="mode"><option value="mdns">mDNS</option><option value="udp">UDP</option></select></div>
          <div><label for="ttl">TTL (horas)</label><input id="ttl" type="number" min="24" max="720"></div>
          <div><label for="seedPercent">Seed %</label><input id="seedPercent" type="number" min="1" max="100"></div>
          <div><label for="minSeeds">Min seeds</label><input id="minSeeds" type="number" min="1" max="200"></div>
          <div><label for="tokenMinutes">Token (min)</label><input id="tokenMinutes" type="number" min="1" max="120"></div>
          <div style="grid-column:1/-1"><label for="sharedSecret">Shared Secret (opcional)</label><input id="sharedSecret" type="password" placeholder="Autenticação do endpoint /p2p/replicate"></div>
        </div>
        <div class="actions" style="margin-top:12px"><button id="saveConfigBtn" class="btn btn-primary">Salvar</button></div>
        <div id="statusLine" class="status-line"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Service Health (Processo Headless)</h2>
      <div class="status-grid" id="serviceHealthGrid"></div>
    </div>

    <div class="panel">
      <h2>Auditoria</h2>
      <div class="form-grid" style="margin-bottom:10px">
        <div><label for="auditActionFilter">Ação</label><select id="auditActionFilter"><option value="all">Todas</option><option value="auto-distribute">Auto-distribute</option><option value="queue">Queue</option><option value="replicate">Replicate</option><option value="skip-duplicate">Skip duplicate</option><option value="cooldown">Cooldown</option></select></div>
        <div><label for="auditPeerFilter">Peer</label><select id="auditPeerFilter"><option value="all">Todos</option></select></div>
        <div><label for="auditStatusFilter">Status</label><select id="auditStatusFilter"><option value="all">Todos</option><option value="success">Sucesso</option><option value="error">Erro</option></select></div>
      </div>
      <div id="auditList" class="audit-list"></div>
    </div>
  </div>
  <script src="js/p2p-debug.js"></script>
</body>
</html>
