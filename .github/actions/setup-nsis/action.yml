name: Setup NSIS
description: Install NSIS and add makensis to PATH on GitHub-hosted Windows runners.

runs:
  using: composite
  steps:
    - name: Install NSIS
      shell: pwsh
      run: |
        choco install nsis -y --no-progress

        $nsisDirs = @(
          'C:\Program Files (x86)\NSIS',
          'C:\Program Files\NSIS'
        )

        foreach ($dir in $nsisDirs) {
          if (Test-Path $dir) {
            $dir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }
        }
