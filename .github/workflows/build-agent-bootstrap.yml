name: Build Agent Bootstrap Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Versao opcional para embed no binario/instalador (ex. 1.2.3)
        required: false
        default: ""
      payload_url:
        description: URL do instalador de segunda etapa
        required: true
        type: string
      payload_sha256:
        description: SHA256 do payload (opcional)
        required: false
        default: ""
      payload_filename:
        description: Nome do payload salvo localmente
        required: false
        default: discovery-stage2-installer.exe
      output_name:
        description: Nome do bootstrap de saida
        required: false
        default: discovery-agent-bootstrap.exe
      discovery_enabled:
        description: Habilitar discovery/p2p por padrao (0 ou 1)
        required: false
        default: "1"
      generic_install:
        description: Gerar bootstrap generico para auto provisioning P2P
        required: false
        type: boolean
        default: false

jobs:
  build-bootstrap:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: |
            src/go.mod
            src/go.sum

      - name: Setup NSIS
        uses: ./.github/actions/setup-nsis

      - name: Build agent binary
        id: binary
        uses: ./.github/actions/build-discovery-binary
        with:
          version: ${{ github.event.inputs.version }}

      - name: Package bootstrap installer
        id: package
        uses: ./.github/actions/package-discovery-nsis
        with:
          mode: bootstrap
          binary_path: ${{ steps.binary.outputs.binary_path }}
          version: ${{ github.event.inputs.version }}
          output_name: ${{ github.event.inputs.output_name }}
          discovery_enabled: ${{ github.event.inputs.discovery_enabled }}
          generic_install: ${{ github.event.inputs.generic_install }}
          payload_url: ${{ github.event.inputs.payload_url }}
          payload_sha256: ${{ github.event.inputs.payload_sha256 }}
          payload_filename: ${{ github.event.inputs.payload_filename }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-agent-bootstrap
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error
