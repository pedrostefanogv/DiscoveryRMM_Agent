name: Release Agent On Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Versao para publicar em release (ex. 1.0.3 ou v1.0.3)
        required: true
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      DISCOVERY_DEFAULT_SERVER_URL: ${{ vars.DISCOVERY_DEFAULT_SERVER_URL }}
      DISCOVERY_DEFAULT_KEY: ${{ secrets.DISCOVERY_DEFAULT_KEY }}
      DISCOVERY_BOOTSTRAP_PAYLOAD_URL: ${{ vars.DISCOVERY_BOOTSTRAP_PAYLOAD_URL }}
      DISCOVERY_BOOTSTRAP_PAYLOAD_SHA256: ${{ vars.DISCOVERY_BOOTSTRAP_PAYLOAD_SHA256 }}
      DISCOVERY_BOOTSTRAP_PAYLOAD_FILENAME: ${{ vars.DISCOVERY_BOOTSTRAP_PAYLOAD_FILENAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: |
            src/go.mod
            src/go.sum

      - name: Setup NSIS
        uses: ./.github/actions/setup-nsis

      - name: Derive release metadata from tag
        id: meta
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $inputVersion = "${{ github.event.inputs.version }}".Trim()
            if ($inputVersion -eq "") {
              throw "Parametro 'version' obrigatorio para workflow_dispatch"
            }
            $normalizedVersion = $inputVersion
            if ($normalizedVersion.Length -gt 0 -and $normalizedVersion[0].ToString().ToLowerInvariant() -eq 'v') {
              $normalizedVersion = $normalizedVersion.Substring(1)
            }
            $tag = "v$normalizedVersion"
          }
          if (-not $tag.StartsWith('v')) {
            throw "Tag invalida: $tag"
          }

          $version = $tag.Substring(1)
          $channel = 'release'
          $prerelease = 'false'
          $makeLatest = 'true'
          $releaseName = "Discovery Agent $tag"
          $installAssetName = "Discovery-Agent-Setup-$version.exe"
          $bootstrapAssetName = "Discovery-Agent-Bootstrap-$version.exe"

          if ($version -match '(^|-)beta(\.|$)') {
            $channel = 'beta'
            $prerelease = 'true'
            $makeLatest = 'false'
            $releaseName = "Discovery Agent Beta $tag"
            $installAssetName = "Discovery-Agent-Beta-Setup-$version.exe"
            $bootstrapAssetName = "Discovery-Agent-Beta-Bootstrap-$version.exe"
          }
          elseif ($version -match '(^|-)lts(\.|$)') {
            $channel = 'lts'
            $prerelease = 'false'
            $makeLatest = 'false'
            $releaseName = "Discovery Agent LTS $tag"
            $installAssetName = "Discovery-Agent-LTS-Setup-$version.exe"
            $bootstrapAssetName = "Discovery-Agent-LTS-Bootstrap-$version.exe"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "make_latest=$makeLatest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "install_asset_name=$installAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "bootstrap_asset_name=$bootstrapAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build agent binary
        id: binary
        uses: ./.github/actions/build-discovery-binary
        with:
          version: ${{ steps.meta.outputs.version }}

      - name: Package release installer
        id: package_installer
        uses: ./.github/actions/package-discovery-nsis
        with:
          mode: installer
          binary_path: ${{ steps.binary.outputs.binary_path }}
          version: ${{ steps.meta.outputs.version }}
          output_name: ${{ steps.meta.outputs.install_asset_name }}
          default_url: ${{ env.DISCOVERY_DEFAULT_SERVER_URL }}
          default_key: ${{ env.DISCOVERY_DEFAULT_KEY }}
          discovery_enabled: '1'

      - name: Package release bootstrap installer
        if: ${{ env.DISCOVERY_BOOTSTRAP_PAYLOAD_URL != '' }}
        id: package_bootstrap
        uses: ./.github/actions/package-discovery-nsis
        with:
          mode: bootstrap
          binary_path: ${{ steps.binary.outputs.binary_path }}
          version: ${{ steps.meta.outputs.version }}
          output_name: ${{ steps.meta.outputs.bootstrap_asset_name }}
          discovery_enabled: '1'
          payload_url: ${{ env.DISCOVERY_BOOTSTRAP_PAYLOAD_URL }}
          payload_sha256: ${{ env.DISCOVERY_BOOTSTRAP_PAYLOAD_SHA256 }}
          payload_filename: ${{ env.DISCOVERY_BOOTSTRAP_PAYLOAD_FILENAME }}

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          $files = @("${{ steps.package_installer.outputs.artifact_path }}")
          $bootstrapPath = "${{ steps.package_bootstrap.outputs.artifact_path }}"

          if ($bootstrapPath -ne '') {
            $files += $bootstrapPath
          }

          "files<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $files | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          generate_release_notes: true
          files: ${{ steps.assets.outputs.files }}
          fail_on_unmatched_files: true
