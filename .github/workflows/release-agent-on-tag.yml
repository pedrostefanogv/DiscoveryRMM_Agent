name: Release Agent On Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Setup MinGW (CGO for Wails)
        shell: pwsh
        run: |
          $mingwDirs = @(
            'C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin',
            'C:\msys64\mingw64\bin',
            'C:\msys64\usr\bin'
          )
          foreach ($dir in $mingwDirs) {
            if (Test-Path $dir) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
              Write-Output "Added MinGW to PATH: $dir"
            }
          }

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisDirs = @(
            'C:\Program Files (x86)\NSIS',
            'C:\Program Files\NSIS'
          )

          foreach ($dir in $nsisDirs) {
            if (Test-Path $dir) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            }
          }

      - name: Derive release metadata from tag
        id: meta
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${env:GITHUB_REF_NAME}"
          $sha = "${env:GITHUB_SHA}"
          if (-not $tag.StartsWith('v')) {
            throw "Tag invalida: $tag"
          }

          $version = $tag.Substring(1)

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releases = Invoke-RestMethod -Method Get -Uri "https://api.github.com/repos/$repo/releases?per_page=100" -Headers $headers
          $existingReleaseTags = @($releases | ForEach-Object { $_.tag_name })

          if ($existingReleaseTags -contains $tag) {
            if ($version -notmatch '^(?<base>\d+\.\d+\.\d+-(?:beta|lts)\.)(?<seq>\d+)$') {
              throw "Tag duplicada sem sufixo incremental suportado: $tag. Use formato X.Y.Z-beta.N ou X.Y.Z-lts.N"
            }

            $base = $Matches['base']
            $seq = [int]$Matches['seq']

            do {
              $seq++
              $version = "$base$seq"
              $tag = "v$version"
            } while ($existingReleaseTags -contains $tag)

            Write-Output "Tag duplicada detectada. Nova tag selecionada: $tag"

            $payload = @{
              ref = "refs/tags/$tag"
              sha = $sha
            } | ConvertTo-Json

            Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/$repo/git/refs" -Headers $headers -Body $payload
            Write-Output "Nova tag criada: $tag -> $sha"
          }

          $channel = 'release'
          $prerelease = 'false'
          $makeLatest = 'true'
          $releaseName = "Discovery Agent $tag"
          $installAssetName = "Discovery-Agent-Setup-$version.exe"
          $bootstrapAssetName = "Discovery-Agent-Bootstrap-$version.exe"
          $agentAssetName = "Discovery-Agent-$version.exe"
          $manifestAssetName = "Discovery-Agent-Manifest-$version.json"

          if ($version -match '(^|-)beta(\.|$)') {
            $channel = 'beta'
            $prerelease = 'true'
            $makeLatest = 'false'
            $releaseName = "Discovery Agent Beta $tag"
            $installAssetName = "Discovery-Agent-Beta-Setup-$version.exe"
            $bootstrapAssetName = "Discovery-Agent-Beta-Bootstrap-$version.exe"
            $agentAssetName = "Discovery-Agent-Beta-$version.exe"
            $manifestAssetName = "Discovery-Agent-Beta-Manifest-$version.json"
          }
          elseif ($version -match '(^|-)lts(\.|$)') {
            $channel = 'lts'
            $prerelease = 'false'
            $makeLatest = 'false'
            $releaseName = "Discovery Agent LTS $tag"
            $installAssetName = "Discovery-Agent-LTS-Setup-$version.exe"
            $bootstrapAssetName = "Discovery-Agent-LTS-Bootstrap-$version.exe"
            $agentAssetName = "Discovery-Agent-LTS-$version.exe"
            $manifestAssetName = "Discovery-Agent-LTS-Manifest-$version.json"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "make_latest=$makeLatest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "install_asset_name=$installAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "bootstrap_asset_name=$bootstrapAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "agent_asset_name=$agentAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "manifest_asset_name=$manifestAssetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cleanup duplicate draft releases for tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.meta.outputs.tag }}"

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releases = Invoke-RestMethod -Method Get -Uri "https://api.github.com/repos/$repo/releases?per_page=100" -Headers $headers
          $draftsForTag = @($releases | Where-Object { $_.tag_name -eq $tag -and $_.draft -eq $true })

          if ($draftsForTag.Count -eq 0) {
            Write-Output "No draft release found for tag $tag"
            exit 0
          }

          foreach ($draft in $draftsForTag) {
            Write-Output "Deleting duplicate draft release id=$($draft.id) tag=$tag"
            Invoke-RestMethod -Method Delete -Uri "https://api.github.com/repos/$repo/releases/$($draft.id)" -Headers $headers
          }

      - name: Build release installer
        shell: pwsh
        run: |
          $params = @{
            ProjectRoot = $PWD
            Version = "${{ steps.meta.outputs.version }}"
            OutputName = "${{ steps.meta.outputs.install_asset_name }}"
            AutoProvisioning = '1'
          }

          .\build\scripts\build-install-installer.ps1 @params

      - name: Prepare standalone agent asset
        shell: pwsh
        run: |
          $source = Join-Path $PWD "src/build/bin/discovery-agent.exe"
          $target = Join-Path $PWD "src/build/bin/${{ steps.meta.outputs.agent_asset_name }}"
          if (-not (Test-Path $source)) {
            throw "Binario standalone nao encontrado: $source"
          }
          Copy-Item -Path $source -Destination $target -Force

      - name: Create GitHub Release and upload installer + standalone agent
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          generate_release_notes: true
          files: |
            src/build/bin/${{ steps.meta.outputs.install_asset_name }}
            src/build/bin/${{ steps.meta.outputs.agent_asset_name }}

      - name: Compute bootstrap payload metadata
        id: payload
        shell: pwsh
        run: |
          $installAssetPath = Join-Path $PWD "src/build/bin/${{ steps.meta.outputs.install_asset_name }}"
          if (-not (Test-Path $installAssetPath)) {
            throw "Installer asset nao encontrado: $installAssetPath"
          }

          $sha = (Get-FileHash -Algorithm SHA256 -Path $installAssetPath).Hash.ToLowerInvariant()
          $payloadUrl = "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/${{ steps.meta.outputs.install_asset_name }}"

          "payload_url=$payloadUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "payload_sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build release bootstrap installer
        shell: pwsh
        run: |
          $params = @{
            ProjectRoot = $PWD
            PayloadUrl = "${{ steps.payload.outputs.payload_url }}"
            Version = "${{ steps.meta.outputs.version }}"
            OutputName = "${{ steps.meta.outputs.bootstrap_asset_name }}"
            PayloadSha256 = "${{ steps.payload.outputs.payload_sha256 }}"
            PayloadFileName = "${{ steps.meta.outputs.install_asset_name }}"
            ExpectedTag = "${{ steps.meta.outputs.tag }}"
            AutoProvisioning = '1'
          }

          .\build\scripts\build-bootstrap-installer.ps1 @params

      - name: Generate release manifest
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $version = "${{ steps.meta.outputs.version }}"
          $channel = "${{ steps.meta.outputs.channel }}"
          $baseUrl = "${{ github.server_url }}/${{ github.repository }}/releases/download/$tag"

          $assetFiles = @(
            @{ Name = "${{ steps.meta.outputs.install_asset_name }}"; Type = "offline-installer" },
            @{ Name = "${{ steps.meta.outputs.agent_asset_name }}"; Type = "agent-standalone" },
            @{ Name = "${{ steps.meta.outputs.bootstrap_asset_name }}"; Type = "online-bootstrap" }
          )

          $assets = @()
          foreach ($asset in $assetFiles) {
            $path = Join-Path $PWD "src/build/bin/$($asset.Name)"
            if (-not (Test-Path $path)) {
              throw "Asset esperado nao encontrado para manifest: $path"
            }

            $hash = (Get-FileHash -Algorithm SHA256 -Path $path).Hash.ToLowerInvariant()
            $size = (Get-Item $path).Length
            $assets += @{
              name = $asset.Name
              type = $asset.Type
              sizeBytes = $size
              sha256 = $hash
              url = "$baseUrl/$($asset.Name)"
            }
          }

          $manifest = @{
            version = $version
            tag = $tag
            channel = $channel
            generatedAtUtc = (Get-Date).ToUniversalTime().ToString("o")
            assets = $assets
          }

          $manifestPath = Join-Path $PWD "src/build/bin/${{ steps.meta.outputs.manifest_asset_name }}"
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path $manifestPath -Encoding UTF8

      - name: Upload bootstrap + manifest assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            src/build/bin/${{ steps.meta.outputs.bootstrap_asset_name }}
            src/build/bin/${{ steps.meta.outputs.manifest_asset_name }}

      - name: Verify required release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.meta.outputs.tag }}"
          $expected = @(
            "${{ steps.meta.outputs.install_asset_name }}",
            "${{ steps.meta.outputs.agent_asset_name }}",
            "${{ steps.meta.outputs.bootstrap_asset_name }}"
          )

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $release = Invoke-RestMethod -Method Get -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers
          $uploaded = @($release.assets | ForEach-Object { $_.name })
          $missing = $expected | Where-Object { $uploaded -notcontains $_ }

          if ($missing.Count -gt 0) {
            throw ("Release incompleta. Assets obrigatorios ausentes: " + ($missing -join ", "))
          }

