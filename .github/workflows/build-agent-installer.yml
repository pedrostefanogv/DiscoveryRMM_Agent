name: Build Agent Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Versao opcional para embed no binario/instalador (ex. 1.2.3)
        required: false
        default: ""
      output_name:
        description: Nome do instalador de saida
        required: false
        default: discovery-agent-install.exe
      default_url:
        description: URL ou host padrao do servidor (opcional)
        required: false
        default: ""
      default_key:
        description: Chave padrao (opcional)
        required: false
        default: ""
      discovery_enabled:
        description: Habilitar discovery/p2p por padrao (0 ou 1)
        required: false
        default: "1"
      generic_install:
        description: Gerar instalador generico para auto provisioning P2P
        required: false
        type: boolean
        default: false
      minimal_default:
        description: Gerar instalador com modo minimo por padrao
        required: false
        type: boolean
        default: false

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: |
            src/go.mod
            src/go.sum

      - name: Setup NSIS
        uses: ./.github/actions/setup-nsis

      - name: Build agent binary
        id: binary
        uses: ./.github/actions/build-discovery-binary
        with:
          version: ${{ github.event.inputs.version }}

      - name: Package installer
        id: package
        uses: ./.github/actions/package-discovery-nsis
        with:
          mode: installer
          binary_path: ${{ steps.binary.outputs.binary_path }}
          version: ${{ github.event.inputs.version }}
          output_name: ${{ github.event.inputs.output_name }}
          default_url: ${{ github.event.inputs.default_url }}
          default_key: ${{ github.event.inputs.default_key }}
          discovery_enabled: ${{ github.event.inputs.discovery_enabled }}
          generic_install: ${{ github.event.inputs.generic_install }}
          minimal_default: ${{ github.event.inputs.minimal_default }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-agent-installer
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error
