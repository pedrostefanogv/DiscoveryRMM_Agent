name: Build Agent Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Versao opcional para embed no binario/instalador (ex. 1.2.3)
        required: false
        default: ""
      output_name:
        description: Nome do instalador de saida
        required: false
        default: discovery-agent-install.exe
      default_url:
        description: URL ou host padrao do servidor (opcional)
        required: false
        default: ""
      default_key:
        description: Chave padrao (opcional)
        required: false
        default: ""
      auto_provisioning:
        description: "Habilitar auto-provisioning (zero-touch via P2P) por padrão (0=off, 1=on)"
        required: false
        default: "1"
      generic_install:
        description: "Instalador generico sem URL/Key pre-configurados — agente usa P2P para auto-provisioning"
        required: false
        type: boolean
        default: false

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Setup MinGW (CGO for Wails)
        shell: pwsh
        run: |
          $mingwDirs = @(
            'C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin',
            'C:\msys64\mingw64\bin',
            'C:\msys64\usr\bin'
          )
          foreach ($dir in $mingwDirs) {
            if (Test-Path $dir) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
              Write-Output "Added MinGW to PATH: $dir"
            }
          }

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $params = @{
            ProjectRoot = $PWD
            Version = "${{ github.event.inputs.version }}"
            OutputName = "${{ github.event.inputs.output_name }}"
            DefaultUrl = "${{ github.event.inputs.default_url }}"
            DefaultKey = "${{ github.event.inputs.default_key }}"
            AutoProvisioning = "${{ github.event.inputs.auto_provisioning }}"
          }

          if ('${{ github.event.inputs.generic_install }}' -eq 'true') {
            $params.GenericInstall = $true
          }

          .\build\scripts\build-install-installer.ps1 @params

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-agent-installer
          path: src/build/bin/*.exe
