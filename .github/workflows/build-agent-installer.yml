name: Build Agent Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Versao opcional para embed no binario/instalador (ex. 1.2.3)
        required: false
        default: ""
      output_name:
        description: Nome do instalador de saida
        required: false
        default: discovery-agent-install.exe
      default_url:
        description: URL ou host padrao do servidor (opcional)
        required: false
        default: ""
      default_key:
        description: Chave padrao (opcional)
        required: false
        default: ""
      discovery_enabled:
        description: Habilitar discovery/p2p por padrao (0 ou 1)
        required: false
        default: "1"
      generic_install:
        description: Gerar instalador generico para auto provisioning P2P
        required: false
        type: boolean
        default: false
      minimal_default:
        description: Gerar instalador com modo minimo por padrao
        required: false
        type: boolean
        default: false

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $params = @{
            ProjectRoot = $PWD
            Version = "${{ github.event.inputs.version }}"
            OutputName = "${{ github.event.inputs.output_name }}"
            DefaultUrl = "${{ github.event.inputs.default_url }}"
            DefaultKey = "${{ github.event.inputs.default_key }}"
            DiscoveryEnabled = "${{ github.event.inputs.discovery_enabled }}"
          }

          if ('${{ github.event.inputs.generic_install }}' -eq 'true') {
            $params.GenericInstall = $true
          }

          if ('${{ github.event.inputs.minimal_default }}' -eq 'true') {
            $params.MinimalDefault = $true
          }

          .\build\scripts\build-install-installer.ps1 @params

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-agent-installer
          path: src/build/bin/*.exe
